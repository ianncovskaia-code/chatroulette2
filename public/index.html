<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Чат-рулетка</title>
    <style>
        body { margin: 0; font-family: sans-serif; background: #1a1a2e; color: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { text-align: center; width: 90%; max-width: 800px; }
        h1 { color: #e94560; }
        button { padding: 15px 30px; font-size: 18px; background: #00d26a; color: white; border: none; border-radius: 8px; cursor: pointer; margin: 10px; }
        #videoContainer { display: none; gap: 10px; margin: 20px 0; }
        video { width: 48%; border: 2px solid #e94560; border-radius: 8px; background: #000; }
        #chatMessages { max-height: 150px; overflow-y: auto; background: #16213e; padding: 10px; border-radius: 8px; margin: 10px 0; text-align: left; }
        .msg { margin: 5px 0; padding: 5px 10px; border-radius: 5px; }
        .msg.you { background: #e94560; margin-left: 20%; }
        .msg.system { background: #ffd700; color: #000; text-align: center; }
        #controls { display: none; }
        input { padding: 10px; width: 60%; border-radius: 5px; border: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎲 Чат-рулетка</h1>
        <div id="startScreen">
            <p>Нажмите кнопку, чтобы найти собеседника</p>
            <button onclick="startSearch()">🔍 Начать поиск</button>
        </div>
        <div id="videoContainer">
            <video id="localVideo" autoplay muted playsinline></video>
            <video id="remoteVideo" autoplay playsinline></video>
        </div>
        <div id="chatMessages"></div>
        <div id="controls">
            <input type="text" id="chatInput" placeholder="Сообщение..." onkeypress="if(event.key==='Enter')sendMessage()">
            <button onclick="sendMessage()">➤</button>
            <button onclick="nextPartner()">⏭ Далее</button>
        </div>
    </div>
    <script>
        let ws, pc, localStream;
        
        function connect() {
            ws = new WebSocket((location.protocol==='https:'?'wss':'ws')+'://'+location.host);
            ws.onmessage = e => handle(JSON.parse(e.data));
            ws.onclose = () => setTimeout(connect, 3000);
        }
        
        function handle(m) {
            if(m.type==='found') { 
                document.getElementById('startScreen').style.display='none'; 
                document.getElementById('videoContainer').style.display='flex'; 
                document.getElementById('controls').style.display='block'; 
                createPC(); 
                // ИСПРАВЛЕНИЕ: Только инициатор создает Offer
                if(m.initiator) createOffer(); 
            }
            if(m.type==='chat') addMsg(m.text, 'them');
            if(m.type==='partner_disconnected') { alert('Собеседник ушёл'); location.reload(); }
            if(m.type==='answer') pc.setRemoteDescription(new RTCSessionDescription(m.answer));
            if(m.type==='candidate') pc.addIceCandidate(new RTCIceCandidate(m.candidate));
        }
        
        async function startSearch() {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({video:true, audio:true});
                document.getElementById('localVideo').srcObject = localStream;
                ws.send(JSON.stringify({type:'search'}));
            } catch(e) { alert('Нет камеры'); }
        }
        
        function createPC() {
            pc = new RTCPeerConnection({iceServers:[{urls:'stun:stun.l.google.com:19302'}]});
            pc.ontrack = e => document.getElementById('remoteVideo').srcObject = e.streams[0];
            pc.onicecandidate = e => { if(e.candidate) ws.send(JSON.stringify({type:'candidate', candidate:e.candidate})); };
            localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
        }
        
        async function createOffer() {
            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            ws.send(JSON.stringify({type:'offer', offer: pc.localDescription}));
        }
        
        function nextPartner() { location.reload(); }
        
        function sendMessage() {
            const inp = document.getElementById('chatInput');
            if(inp.value.trim()) { ws.send(JSON.stringify({type:'chat', text:inp.value})); addMsg(inp.value, 'you'); inp.value=''; }
        }
        
        function addMsg(t, type) {
            const d = document.createElement('div'); d.className='msg '+type; d.textContent=t;
            document.getElementById('chatMessages').appendChild(d);
        }
        
        connect();
    </script>
</body>
</html>
